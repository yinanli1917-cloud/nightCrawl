<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Shadow DOM Overlay Test</title></head>
<body>
  <main id="main-content">
    <h1>Article Behind Shadow Overlay</h1>
    <p>This content should be preserved.</p>
  </main>
  <div id="shadow-host"></div>
  <script>
    const host = document.getElementById('shadow-host');
    const shadow = host.attachShadow({ mode: 'open' });
    shadow.innerHTML = `
      <div style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:rgba(0,0,0,0.7)">
        <div style="background:white;padding:20px;margin:100px auto;max-width:400px">
          <h2>Cookie Consent</h2>
          <p>We use cookies. Accept all?</p>
          <button>Accept</button>
        </div>
      </div>
    `;
  </script>
</body>
</html>
